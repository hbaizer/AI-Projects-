<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Thrift Finds">
<title>Thrift Finds</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Libre+Baskerville:ital@0;1&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  :root {
    --kraft: #c8a97a;
    --kraft-light: #e8d5b0;
    --kraft-dark: #8b6a3e;
    --ink: #2c1810;
    --ink-light: #5c3d2e;
    --red: #b5341a;
    --green: #3a6b3e;
    --cream: #f5ead8;
    --cream-dark: #ede0c4;
    --stamp: #7a3b1e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: #1a1008;
    background-image:
      radial-gradient(ellipse at 20% 20%, #2a1a0e 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, #1a0e08 0%, transparent 60%);
    min-height: 100vh;
    font-family: 'Libre Baskerville', Georgia, serif;
    color: var(--ink);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  .app-wrapper {
    width: 100%;
    max-width: 430px;
    min-height: 100vh;
    background: var(--cream);
    background-image:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 27px,
        rgba(139,106,62,0.08) 27px,
        rgba(139,106,62,0.08) 28px
      );
    position: relative;
    overflow: hidden;
  }

  /* Paper texture edge shadows */
  .app-wrapper::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(to right, rgba(0,0,0,0.06) 0%, transparent 15px),
      linear-gradient(to left, rgba(0,0,0,0.06) 0%, transparent 15px);
    pointer-events: none;
    z-index: 10;
  }

  /* ===== HEADER ===== */
  .header {
    background: var(--ink);
    padding: 20px 20px 16px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 4px;
    background: repeating-linear-gradient(
      90deg,
      var(--kraft) 0px, var(--kraft) 8px,
      var(--ink) 8px, var(--ink) 10px
    );
  }

  .header-tag {
    display: inline-block;
    background: var(--red);
    color: white;
    font-family: 'Special Elite', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 2px;
    margin-bottom: 8px;
  }

  .header h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 32px;
    font-weight: 700;
    color: var(--cream);
    line-height: 1;
    letter-spacing: -0.5px;
  }

  .header h1 em {
    font-style: italic;
    color: var(--kraft);
  }

  .header-sub {
    font-family: 'Special Elite', monospace;
    font-size: 10px;
    color: var(--kraft-light);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 5px;
    opacity: 0.7;
  }

  .header-stats {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid rgba(200,169,122,0.2);
  }

  .stat {
    text-align: center;
  }

  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--kraft);
    line-height: 1;
  }

  .stat-label {
    font-family: 'Special Elite', monospace;
    font-size: 8px;
    color: rgba(200,169,122,0.6);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* ===== NAV TABS ===== */
  .nav-tabs {
    display: flex;
    background: var(--cream-dark);
    border-bottom: 2px solid var(--kraft);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .nav-tab {
    flex: 1;
    padding: 11px 8px;
    font-family: 'Special Elite', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    background: none;
    border: none;
    color: var(--kraft-dark);
    cursor: pointer;
    transition: all 0.2s;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
  }

  .nav-tab.active {
    color: var(--ink);
    border-bottom-color: var(--red);
    background: var(--cream);
  }

  /* ===== VIEWS ===== */
  .view { display: none; padding: 16px; }
  .view.active { display: block; }

  /* ===== STORE CARDS ===== */
  .stores-list { display: flex; flex-direction: column; gap: 12px; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--kraft-dark);
  }

  .empty-icon {
    font-size: 48px;
    margin-bottom: 12px;
    opacity: 0.4;
  }

  .empty-state h3 {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    margin-bottom: 6px;
    color: var(--ink-light);
  }

  .empty-state p {
    font-size: 13px;
    line-height: 1.6;
    opacity: 0.7;
  }

  .store-card {
    background: white;
    border: 1px solid var(--kraft-light);
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 2px 3px 0 var(--kraft-light), 4px 5px 0 rgba(139,106,62,0.1);
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
    animation: cardIn 0.3s ease both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .store-card:active { transform: scale(0.99); }

  .card-ribbon {
    position: absolute;
    top: 0; left: 0;
    width: 4px;
    height: 100%;
  }

  .card-ribbon.visited { background: var(--green); }
  .card-ribbon.unvisited { background: var(--kraft); }

  .card-body {
    padding: 12px 14px 12px 18px;
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }

  .store-name {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.2;
    flex: 1;
  }

  .visit-badge {
    font-family: 'Special Elite', monospace;
    font-size: 8px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 7px;
    border-radius: 2px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .visit-badge.visited {
    background: #e8f5e9;
    color: var(--green);
    border: 1px solid #c8e6c9;
  }

  .visit-badge.unvisited {
    background: #fff8e1;
    color: #a07020;
    border: 1px solid #ffe082;
  }

  .store-address {
    font-size: 12px;
    color: var(--ink-light);
    margin-top: 4px;
    opacity: 0.8;
    line-height: 1.4;
  }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px dashed var(--kraft-light);
  }

  .last-visit {
    font-family: 'Special Elite', monospace;
    font-size: 10px;
    color: var(--kraft-dark);
    flex: 1;
  }

  .last-visit span { color: var(--ink); }

  .card-actions {
    display: flex;
    gap: 6px;
  }

  .action-btn {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: 1px solid var(--kraft-light);
    background: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;
    text-decoration: none;
    color: inherit;
  }

  .action-btn:active { background: var(--kraft-light); transform: scale(0.9); }
  .action-btn.checkin { background: var(--green); border-color: var(--green); color: white; }
  .action-btn.edit-btn { background: var(--cream); }
  .action-btn.delete-btn:active { background: #ffebee; }

  .card-note {
    margin-top: 8px;
    font-size: 12px;
    font-style: italic;
    color: var(--ink-light);
    line-height: 1.5;
    background: #fffbf4;
    border-left: 2px solid var(--kraft);
    padding: 5px 8px;
    border-radius: 0 2px 2px 0;
  }

  /* ===== FILTER BAR ===== */
  .filter-bar {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
    align-items: center;
    flex-wrap: wrap;
  }

  .search-box {
    flex: 1 1 100%;
    padding: 8px 12px;
    font-family: 'Libre Baskerville', serif;
    font-size: 13px;
    border: 1px solid var(--kraft);
    background: white;
    border-radius: 3px;
    color: var(--ink);
    outline: none;
  }

  .search-box:focus { border-color: var(--kraft-dark); box-shadow: 0 0 0 2px rgba(139,106,62,0.15); }

  .filter-btn {
    padding: 8px 10px;
    font-family: 'Special Elite', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    border: 1px solid var(--kraft);
    background: white;
    border-radius: 3px;
    cursor: pointer;
    color: var(--kraft-dark);
    white-space: nowrap;
    transition: all 0.15s;
  }

  .filter-btn.active { background: var(--ink); color: var(--cream); border-color: var(--ink); }

  /* All button - always prominent */
  .filter-all {
    background: var(--red) !important;
    color: white !important;
    border-color: var(--red) !important;
    font-weight: bold;
  }
  .filter-all.active {
    background: var(--ink) !important;
    border-color: var(--ink) !important;
  }

  /* Near Me - independent toggle, never grays out */
  .filter-nearme {
    border-color: #1a6b3e;
    color: #1a6b3e;
  }
  .filter-nearme.active {
    background: #1a6b3e !important;
    color: white !important;
    border-color: #1a6b3e !important;
  }

  /* Clear button */
  .clear-btn {
    padding: 8px 12px;
    font-family: 'Special Elite', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    border: 1px solid var(--red);
    background: white;
    border-radius: 3px;
    cursor: pointer;
    color: var(--red);
    white-space: nowrap;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .clear-btn:active { background: #ffebee; }

  /* Wishlist card background */
  .store-card.wishlisted {
    background: #fff0f3;
  }

  /* ===== FAB ===== */
  .fab {
    position: fixed;
    bottom: 28px;
    right: calc(50% - 215px + 16px);
    width: 58px;
    height: 58px;
    border-radius: 50%;
    background: var(--red);
    color: white;
    font-size: 28px;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(181,52,26,0.4), 0 2px 4px rgba(0,0,0,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .fab:active { transform: scale(0.92); box-shadow: 0 2px 8px rgba(181,52,26,0.4); }

  @media (max-width: 430px) {
    .fab { right: 16px; }
  }

  /* ===== MODAL ===== */
  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,16,8,0.7);
    z-index: 300;
    align-items: flex-end;
    justify-content: center;
  }

  .modal-backdrop.open { display: flex; }

  .modal {
    width: 100%;
    max-width: 430px;
    background: var(--cream);
    border-radius: 16px 16px 0 0;
    max-height: 92vh;
    overflow-y: auto;
    animation: slideUp 0.3s cubic-bezier(0.25,0.46,0.45,0.94);
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-handle {
    width: 40px;
    height: 4px;
    background: var(--kraft);
    border-radius: 2px;
    margin: 12px auto 0;
    opacity: 0.5;
  }

  .modal-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--kraft-light);
  }

  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-style: italic;
    color: var(--ink);
  }

  .modal-body { padding: 16px 20px 32px; }

  .form-group { margin-bottom: 16px; }

  .form-label {
    display: block;
    font-family: 'Special Elite', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--kraft-dark);
    margin-bottom: 5px;
  }

  .form-input, .form-textarea {
    width: 100%;
    padding: 10px 12px;
    font-family: 'Libre Baskerville', serif;
    font-size: 14px;
    border: 1px solid var(--kraft);
    background: white;
    border-radius: 3px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  .form-input:focus, .form-textarea:focus {
    border-color: var(--kraft-dark);
    box-shadow: 0 0 0 2px rgba(139,106,62,0.15);
  }

  .form-textarea { resize: vertical; min-height: 80px; }

  .form-row { display: flex; gap: 10px; }
  .form-row .form-group { flex: 1; }

  .btn {
    padding: 12px 20px;
    font-family: 'Special Elite', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
    width: 100%;
    margin-top: 8px;
  }

  .btn-primary { background: var(--ink); color: var(--cream); }
  .btn-primary:active { background: var(--ink-light); }
  .btn-secondary { background: var(--cream-dark); color: var(--ink-light); border: 1px solid var(--kraft); }



  /* ===== MAP/SORT VIEW ===== */
  .sort-options {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }

  /* ===== HISTORY ===== */
  .history-entry {
    display: flex;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px dashed var(--kraft-light);
    animation: cardIn 0.3s ease both;
  }

  .history-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--kraft);
    margin-top: 5px;
    flex-shrink: 0;
  }

  .history-store {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    color: var(--ink);
  }

  .history-address {
    font-size: 11px;
    color: var(--ink-light);
    opacity: 0.7;
    margin-top: 1px;
    margin-bottom: 1px;
  }

  .history-date {
    font-family: 'Special Elite', monospace;
    font-size: 10px;
    color: var(--kraft-dark);
    letter-spacing: 1px;
    margin-top: 2px;
  }



  /* ===== STARS ===== */
  .star-row {
    display: flex;
    gap: 4px;
    margin-top: 6px;
  }

  .star-btn {
    background: none;
    border: none;
    font-size: 18px;
    cursor: pointer;
    padding: 0;
    line-height: 1;
    opacity: 0.25;
    transition: opacity 0.15s, transform 0.1s;
  }

  .star-btn.lit { opacity: 1; }
  .star-btn:active { transform: scale(1.3); }

  /* ===== WISHLIST ===== */
  .wishlist-btn {
    background: none;
    border: none;
    font-size: 16px;
    cursor: pointer;
    padding: 0;
    line-height: 1;
    opacity: 0.3;
    transition: opacity 0.15s, transform 0.1s;
  }

  .wishlist-btn.active { opacity: 1; }
  .wishlist-btn:active { transform: scale(1.3); }

  /* ===== HISTORY DELETE ===== */
  .history-delete {
    background: none;
    border: none;
    font-size: 14px;
    color: var(--kraft-dark);
    cursor: pointer;
    opacity: 0.4;
    padding: 2px 4px;
    flex-shrink: 0;
    transition: opacity 0.15s;
  }

  .history-delete:active { opacity: 1; }

  /* ===== REFRESH LOCATION BUTTON ===== */
  .refresh-loc-btn {
    padding: 8px 10px;
    font-family: 'Special Elite', monospace;
    font-size: 11px;
    border: 1px solid var(--kraft);
    background: white;
    border-radius: 3px;
    cursor: pointer;
    color: var(--kraft-dark);
    transition: all 0.15s;
    display: none;
  }

  .refresh-loc-btn.show { display: block; }
  .refresh-loc-btn:active { background: var(--kraft-light); }
  .visit-count {
    font-family: 'Special Elite', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    color: var(--kraft-dark);
    margin-top: 2px;
  }

  .dist-badge {
    font-family: 'Special Elite', monospace;
    font-size: 10px;
    color: #1a6b3e;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .compass-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
    flex-shrink: 0;
  }

  .compass-dial {
    width: 44px;
    height: 44px;
    flex-shrink: 0;
  }

  .compass-dist {
    font-family: 'Special Elite', monospace;
    font-size: 13px;
    color: #1a6b3e;
    letter-spacing: 0.5px;
    text-align: center;
    line-height: 1;
  }

  #file-input { display: none; }

  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: var(--cream);
    padding: 10px 20px;
    border-radius: 20px;
    font-family: 'Special Elite', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    opacity: 0;
    transition: all 0.3s;
    z-index: 500;
    white-space: nowrap;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<div class="app-wrapper">

  <!-- HEADER -->
  <div class="header">
    <div class="header-tag">✦ My Collection ✦</div>
    <h1>Thrift <em>Finds</em></h1>
    <div class="header-sub">A Curator's Field Guide</div>
    <div class="header-stats">
      <div class="stat">
        <div class="stat-num" id="stat-total">0</div>
        <div class="stat-label">Stores</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="stat-visited">0</div>
        <div class="stat-label">Visited</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="stat-this-month">0</div>
        <div class="stat-label">This Month</div>
      </div>
    </div>
  </div>

  <!-- NAV TABS -->
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchTab('stores')">📋 My Stores</button>
    <button class="nav-tab" onclick="switchTab('add')">📸 Add Store</button>
    <button class="nav-tab" onclick="switchTab('history')">📅 History</button>
  </div>

  <!-- STORES VIEW -->
  <div class="view active" id="view-stores">
    <div class="filter-bar">
      <div style="display:flex; gap:6px; width:100%; align-items:center;">
        <input class="search-box" type="search" placeholder="Search stores…" oninput="renderStores()" id="search-box">
        <button class="clear-btn" onclick="clearSearch()" title="Clear search and filters">✕ Clear</button>
      </div>
      <div style="display:flex; gap:6px; flex-wrap:wrap; width:100%; align-items:center;">
        <button class="filter-btn filter-all active" id="btn-all" onclick="setFilter('all', this)">★ All</button>
        <button class="filter-btn" id="btn-visited" onclick="setFilter('visited', this)">Visited</button>
        <button class="filter-btn" id="btn-unvisited" onclick="setFilter('unvisited', this)">Unvisited</button>
        <button class="filter-btn" id="btn-wishlist" onclick="setFilter('wishlist', this)">🔖 Wishlist</button>
        <button class="filter-btn filter-nearme" id="nearme-btn" onclick="sortByDistance(this)">📍 Near Me</button>
        <button class="refresh-loc-btn" id="refresh-loc-btn" onclick="refreshLocation()">🔄</button>
      </div>
    </div>
    <div id="geocode-status" style="display:none; font-family:'Special Elite',monospace; font-size:10px; letter-spacing:1px; color:var(--kraft-dark); text-align:center; padding:8px 0 4px;"></div>
    <div class="stores-list" id="stores-list"></div>
  </div>

  <!-- ADD STORE VIEW -->
  <div class="view" id="view-add">

    <div class="form-group">
      <label class="form-label">Store Name *</label>
      <input class="form-input" id="f-name" type="text" placeholder="e.g. Goodwill, Salvation Army…">
    </div>
    <div class="form-group">
      <label class="form-label">Address</label>

function seedIfEmpty() {
  const existing = JSON.parse(localStorage.getItem('thrift-stores') || '[]');
  if (existing.length >= 100) return; // has a full dataset, don't overwrite
  // Less than 100 stores means something went wrong — reload the full seed
  stores = SEED_STORES.map((s, i) => ({
    id: 'seed-' + i,
    name: s.name,
    address: s.address,
    phone: s.phone,
    lastVisit: null,
    notes: '',
    addedOn: new Date().toISOString().slice(0, 10),

  }));

}

function today() {
  return new Date().toISOString().slice(0, 10);
}

function formatDate(d) {
  if (!d) return 'Not yet visited';
  const dt = new Date(d + 'T12:00:00');
  return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function daysAgo(d) {
  if (!d) return null;
  const diff = Math.floor((new Date() - new Date(d + 'T12:00:00')) / 86400000);
  if (diff < 0) return 'Upcoming';
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Yesterday';
  if (diff < 7) return `${diff} days ago`;
  if (diff < 30) return `${Math.floor(diff/7)}w ago`;
  if (diff < 365) return `${Math.floor(diff/30)}mo ago`;
  return `${Math.floor(diff/365)}y ago`;
}

// ===== DISTANCE SORT =====
function haversine(lat1, lng1, lat2, lng2) {
  const R = 3958.8; // miles
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2) ** 2 +
    Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLng/2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function calcBearing(lat1, lng1, lat2, lng2) {
  const toRad = d => d * Math.PI / 180;
  const dLng = toRad(lng2 - lng1);
  const y = Math.sin(dLng) * Math.cos(toRad(lat2));
  const x = Math.cos(toRad(lat1)) * Math.sin(toRad(lat2)) -
            Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(dLng);
  return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

function bearingToDir(b) {
  const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return dirs[Math.round(b / 22.5) % 16];
}

function buildCompassSVG(bearing, dist) {
  const cx = 22, cy = 22;
  const rad = (bearing - 90) * Math.PI / 180;

  // Arrow starts exactly at center, tip near edge
  const tipX  = cx + Math.cos(rad) * 14;
  const tipY  = cy + Math.sin(rad) * 14;
  const tailX = cx; // tail stays at center
  const tailY = cy;

  // Arrowhead wings
  const wingLen = 5;
  const wingAngle = 2.4;
  const w1x = tipX + Math.cos(rad + wingAngle) * wingLen;
  const w1y = tipY + Math.sin(rad + wingAngle) * wingLen;
  const w2x = tipX + Math.cos(rad - wingAngle) * wingLen;
  const w2y = tipY + Math.sin(rad - wingAngle) * wingLen;

  return `<div class="compass-wrap">
    <svg class="compass-dial" viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
      <circle cx="${cx}" cy="${cy}" r="20" fill="#f5ead8" stroke="#8b6a3e" stroke-width="1.5"/>
      <circle cx="${cx}" cy="${cy}" r="15" fill="none" stroke="#c8a97a" stroke-width="0.5" stroke-dasharray="2,3"/>
      <line x1="${cx}" y1="3"  x2="${cx}" y2="8"  stroke="#8b6a3e" stroke-width="1.5"/>
      <line x1="${cx}" y1="36" x2="${cx}" y2="41" stroke="#8b6a3e" stroke-width="0.8"/>
      <line x1="3"  y1="${cy}" x2="8"  y2="${cy}" stroke="#8b6a3e" stroke-width="0.8"/>
      <line x1="36" y1="${cy}" x2="41" y2="${cy}" stroke="#8b6a3e" stroke-width="0.8"/>
      <text x="${cx}" y="10.5" text-anchor="middle" font-family="Special Elite,monospace" font-size="5.5" fill="#8b6a3e" font-weight="bold">N</text>
      <line x1="${tailX}" y1="${tailY}" x2="${tipX}" y2="${tipY}"
        stroke="#b5341a" stroke-width="2.5" stroke-linecap="round"/>
      <polyline points="${w1x},${w1y} ${tipX},${tipY} ${w2x},${w2y}"
        fill="none" stroke="#b5341a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="${cx}" cy="${cy}" r="2.5" fill="#2c1810"/>
      <circle cx="${cx}" cy="${cy}" r="1"   fill="#c8a97a"/>
    </svg>
    <div class="compass-dist">${dist} mi</div>
  </div>`;
}

async function geocodeAddress(address) {
  const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(address)}`;
  try {
    const res = await fetch(url, { headers: { 'Accept-Language': 'en' } });
    const data = await res.json();
    if (data && data[0]) return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
  } catch {}
  return null;
}

async function sortByDistance(btn) {
  // Toggle off if already active
  if (sortByDist) {
    sortByDist = false;
    btn.classList.remove('active');
    document.getElementById('geocode-status').style.display = 'none';
    document.getElementById('refresh-loc-btn').classList.remove('show');
    renderStores();
    return;
  }

  // Activate Near Me — don't touch the filter buttons
  btn.classList.add('active');

  const status = document.getElementById('geocode-status');
  status.style.display = 'block';
  status.textContent = 'Getting your location…';

  // Get fresh user position - maximumAge:0 forces iPhone to get real GPS, not cached
  try {
    const pos = await new Promise((resolve, reject) =>
      navigator.geolocation.getCurrentPosition(resolve, reject, {
        timeout: 10000,
        maximumAge: 0,
        enableHighAccuracy: true
      })
    );
    userLat = pos.coords.latitude;
    userLng = pos.coords.longitude;
  } catch {
    status.textContent = '';
    status.style.display = 'none';
    showToast('Location access denied — check iPhone Settings');
    btn.classList.remove('active');
    return;
  }

  // Calculate distances and bearings for all stores that have coordinates
  stores.forEach(s => {
    if (s._lat != null && s._lng != null) {
      s._dist = haversine(userLat, userLng, s._lat, s._lng);
      s._bearing = calcBearing(userLat, userLng, s._lat, s._lng);
    } else {
      s._dist = null;
      s._bearing = null;
    }
  });

  sortByDist = true;
  status.textContent = '';
  status.style.display = 'none';
  document.getElementById('refresh-loc-btn').classList.add('show');
  renderStores();
}

function renderStores() {
  const query = (document.querySelector('.search-box')?.value || '').toLowerCase();
  const list = document.getElementById('stores-list');

  let filtered = stores.filter(s => {
    const matchSearch = !query ||
      s.name.toLowerCase().includes(query) ||
      (s.address || '').toLowerCase().includes(query) ||
      (s.notes || '').toLowerCase().includes(query);
    const matchFilter =
      activeFilter === 'all' ||
      (activeFilter === 'visited' && s.lastVisit) ||
      (activeFilter === 'unvisited' && !s.lastVisit) ||
      (activeFilter === 'wishlist' && s.wishlist);
    return matchSearch && matchFilter;
  });

  // Sort: by distance if active, otherwise most recently visited first
  if (sortByDist && userLat !== null) {
    filtered.sort((a, b) => (a._dist ?? 99999) - (b._dist ?? 99999));
  } else {
    filtered.sort((a, b) => {
      if (!a.lastVisit && !b.lastVisit) return a.name.localeCompare(b.name);
      if (!a.lastVisit) return 1;
      if (!b.lastVisit) return -1;
      return b.lastVisit.localeCompare(a.lastVisit);
    });
  }

  if (filtered.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🏷️</div>
        <h3>${stores.length === 0 ? 'No stores yet' : 'No matches'}</h3>
        <p>${stores.length === 0 ? 'Tap the + button to add your first thrift store.' : 'Try a different search or filter.'}</p>
      </div>`;
    return;
  }

  list.innerHTML = filtered.map(s => {
    const visited = !!s.lastVisit;
    const mapsUrl = s.address
      ? `https://maps.apple.com/?q=${encodeURIComponent(s.address)}`
      : `https://maps.apple.com/?q=${encodeURIComponent(s.name)}`;
    const visitCount = history.filter(h => h.storeId === s.id).length;

    // Compass badge - SVG dial
    let compassBadge = '';
    if (sortByDist && s._dist != null && s._bearing != null) {
      const dist = s._dist < 1 ? s._dist.toFixed(1) : Math.round(s._dist);
      compassBadge = buildCompassSVG(s._bearing, dist);
    }

    return `
    <div class="store-card ${s.wishlist ? 'wishlisted' : ''}" id="card-${s.id}">
      <div class="card-ribbon ${visited ? 'visited' : 'unvisited'}"></div>
      <div class="card-body">
        <div class="card-top">
          <div style="flex:1; min-width:0;">
            <div class="store-name">${s.name}</div>
            ${s.address ? `<div class="store-address">📍 ${s.address}</div>` : ''}
            ${visitCount > 0 ? `<div class="visit-count">Visited ${visitCount} time${visitCount !== 1 ? 's' : ''}</div>` : ''}
            <div class="star-row">
              <button class="star-btn ${(s.rating||0) >= 1 ? 'lit' : ''}" onclick="setRating('${s.id}',${(s.rating||0) === 1 ? 0 : 1})">★</button>
              <button class="star-btn ${(s.rating||0) >= 2 ? 'lit' : ''}" onclick="setRating('${s.id}',${(s.rating||0) === 2 ? 0 : 2})">★</button>
              <button class="star-btn ${(s.rating||0) >= 3 ? 'lit' : ''}" onclick="setRating('${s.id}',${(s.rating||0) === 3 ? 0 : 3})">★</button>
              <button class="wishlist-btn ${s.wishlist ? 'active' : ''}" onclick="toggleWishlist('${s.id}')" title="${s.wishlist ? 'On wishlist' : 'Add to wishlist'}">🔖</button>
            </div>
          </div>
          ${compassBadge ? compassBadge : `<div class="visit-badge ${visited ? 'visited' : 'unvisited'}">${visited ? '✓ Visited' : 'Not yet'}</div>`}
        </div>
        ${compassBadge ? `<div style="margin-top:4px;"><span class="visit-badge ${visited ? 'visited' : 'unvisited'}" style="font-size:8px;">${visited ? '✓ Visited' : 'Not yet'}</span></div>` : ''}

        ${s.notes ? `<div class="card-note">${s.notes}</div>` : ''}

        <div class="card-meta">
          <div class="last-visit">
            ${visited
              ? `Last visit: <span>${formatDate(s.lastVisit)}</span> · ${daysAgo(s.lastVisit)}`
              : '<span>Never visited</span>'}
          </div>
          <div class="card-actions">
            ${s.address ? `<a class="action-btn" href="${mapsUrl}" title="Directions">🗺️</a>` : ''}
            ${s.phone ? `<a class="action-btn" href="tel:${s.phone.replace(/\D/g,'')}" title="Call">📞</a>` : ''}
            <button class="action-btn checkin" onclick="checkIn('${s.id}')" title="Check in today">✓</button>
            <button class="action-btn edit-btn" onclick="openEdit('${s.id}')" title="Edit">✏️</button>
            <button class="action-btn delete-btn" onclick="deleteStore('${s.id}')" title="Delete">🗑️</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ===== STATS =====
function updateStats() {
  const thisMonth = stores.filter(s => {
    if (!s.lastVisit) return false;
    const d = new Date(s.lastVisit + 'T12:00:00');
    const now = new Date();
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  }).length;

  document.getElementById('stat-total').textContent = stores.length;
  document.getElementById('stat-visited').textContent = stores.filter(s => s.lastVisit).length;
  document.getElementById('stat-this-month').textContent = thisMonth;
}

// ===== ADD STORE =====
function saveStore() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { showToast('Please enter a store name'); return; }

  // Check for duplicate (name + address)
  const addr = document.getElementById('f-address').value.trim();
  const dup = stores.find(s =>
    s.name.toLowerCase() === name.toLowerCase() &&
    (s.address || '').toLowerCase() === addr.toLowerCase()
  );
  if (dup) { showToast('That store is already in your list'); return; }

  const store = {
    id: Date.now().toString(),
    name,
    address: document.getElementById('f-address').value.trim(),
    phone: document.getElementById('f-phone').value.trim(),
    lastVisit: document.getElementById('f-date').value || null,
    notes: document.getElementById('f-notes').value.trim(),
    addedOn: today()
  };

  stores.push(store);

  if (store.lastVisit) {
    history.unshift({ storeId: store.id, storeName: store.name, storeAddress: store.address || '', date: store.lastVisit });
  }

  save();
  clearForm();
  updateStats();
  showToast('Store saved ✓');
  switchTab('stores');
}

function clearForm() {
  ['f-name','f-address','f-phone','f-notes','f-date'].forEach(id => {
    document.getElementById(id).value = '';
  });
}

// ===== CHECK IN =====
function checkIn(id) {
  const store = stores.find(s => s.id === id);
  if (!store) return;
  store.lastVisit = today();
  history.unshift({ storeId: id, storeName: store.name, storeAddress: store.address || '', date: today() });
  save();
  renderStores();
  renderHistory();
  updateStats();
  showToast(`Checked in at ${store.name} ✓`);
}

// ===== DELETE =====
function deleteStore(id) {
  if (!confirm('Remove this store from your list?')) return;
  stores = stores.filter(s => s.id !== id);
  save();
  renderStores();
  updateStats();
  showToast('Store removed');
}

// ===== EDIT =====
function openEdit(id) {
  const s = stores.find(s => s.id === id);
  if (!s) return;
  document.getElementById('edit-id').value = s.id;
  document.getElementById('edit-name').value = s.name;
  document.getElementById('edit-address').value = s.address || '';
  document.getElementById('edit-phone').value = s.phone || '';
  document.getElementById('edit-date').value = s.lastVisit || ''; // only show existing date, never default to today
  document.getElementById('edit-notes').value = s.notes || '';
  document.getElementById('edit-modal').classList.add('open');
}

function saveEdit() {
  const id = document.getElementById('edit-id').value;
  const store = stores.find(s => s.id === id);
  if (!store) return;

  const newDate = document.getElementById('edit-date').value || null;
  const oldDate = store.lastVisit || null;

  store.name = document.getElementById('edit-name').value.trim() || store.name;
  store.address = document.getElementById('edit-address').value.trim();
  store.phone = document.getElementById('edit-phone').value.trim();
  store.notes = document.getElementById('edit-notes').value.trim();
  store.lastVisit = newDate;

  // Only add history entry if the date actually changed to a new value
  if (newDate && newDate !== oldDate) {
    // Remove any existing history entry for this store on this date to prevent duplicates
    history = history.filter(h => !(h.storeId === id && h.date === newDate));
    history.unshift({ storeId: id, storeName: store.name, storeAddress: store.address || '', date: newDate });
  }

  save();
  closeModal();
  renderStores();
  renderHistory();
  updateStats();
  showToast('Changes saved ✓');
}

function closeModal() {
  document.getElementById('edit-modal').classList.remove('open');
}

document.getElementById('edit-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ===== HISTORY =====
function renderHistory() {
  const list = document.getElementById('history-list');
  if (history.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📅</div>
        <h3>No visits yet</h3>
        <p>Check in at a store and your history will appear here.</p>
      </div>`;
    return;
  }

  const sorted = [...history].sort((a, b) => b.date.localeCompare(a.date));
  list.innerHTML = sorted.map((h, i) => `
    <div class="history-entry">
      <div class="history-dot"></div>
      <div style="flex:1;">
        <div class="history-store">${h.storeName}</div>
        ${h.storeAddress ? `<div class="history-address">📍 ${h.storeAddress}</div>` : ''}
        <div class="history-date">${formatDate(h.date)} · ${daysAgo(h.date)}</div>
      </div>
      <button class="history-delete" onclick="deleteHistoryEntry(${sorted.indexOf(h)})" title="Remove">🗑️</button>
    </div>
  `).join('');
}

// ===== RATINGS =====
function setRating(id, rating) {
  const store = stores.find(s => s.id === id);
  if (!store) return;
  store.rating = rating;
  save();
  renderStores();
}

// ===== WISHLIST =====
function toggleWishlist(id) {
  const store = stores.find(s => s.id === id);
  if (!store) return;
  store.wishlist = !store.wishlist;
  save();
  renderStores();
}

// ===== DELETE HISTORY ENTRY =====
function deleteHistoryEntry(sortedIndex) {
  if (!confirm('Remove this visit from history?')) return;
  const sorted = [...history].sort((a, b) => b.date.localeCompare(a.date));
  const entry = sorted[sortedIndex];
  if (!entry) return;
  const idx = history.indexOf(entry);
  if (idx > -1) history.splice(idx, 1);
  save();
  renderHistory();
  updateStats();
  showToast('Visit removed');
}

// ===== REFRESH LOCATION =====
async function refreshLocation() {
  const status = document.getElementById('geocode-status');
  status.style.display = 'block';
  status.textContent = 'Refreshing location…';
  try {
    const pos = await new Promise((resolve, reject) =>
      navigator.geolocation.getCurrentPosition(resolve, reject, {
        timeout: 10000,
        maximumAge: 0,  // force fresh reading, ignore cache
        enableHighAccuracy: true
      })
    );
    userLat = pos.coords.latitude;
    userLng = pos.coords.longitude;
    stores.forEach(s => {
      if (s._lat != null && s._lng != null) {
        s._dist = haversine(userLat, userLng, s._lat, s._lng);
        s._bearing = calcBearing(userLat, userLng, s._lat, s._lng);
      }
    });
    status.textContent = '';
    status.style.display = 'none';
    renderStores();
    showToast('Location updated ✓');
  } catch {
    status.textContent = '';
    status.style.display = 'none';
    showToast('Could not get location — check Settings');
  }
}
function exportData() {
  const data = {
    version: 1,
    exportDate: today(),
    stores: stores,
    history: history
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `thrift-finds-backup-${today()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Data exported ✓');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      // Support both raw store arrays and full backup files
      const incoming = data.stores || (Array.isArray(data) ? data : null);
      if (!incoming) { showToast('Unrecognized file format'); return; }

      // Merge - skip duplicates by name+address
      let added = 0;
      incoming.forEach(s => {
        const dup = stores.find(existing =>
          existing.name.toLowerCase() === (s.name||'').toLowerCase() &&
          (existing.address||'').toLowerCase() === (s.address||'').toLowerCase()
        );
        if (!dup) {
          stores.push({
            id: s.id || Date.now().toString() + Math.random(),
            name: s.name || 'Unknown',
            address: s.address || '',
            phone: s.phone || '',
            lastVisit: s.lastVisit || null,
            notes: s.notes || '',
            addedOn: s.addedOn || today(),
            _lat: s._lat || null,
            _lng: s._lng || null
          });
          added++;
        }
      });

      // Merge history if present
      if (data.history) {
        data.history.forEach(h => {
          const dup = history.find(existing =>
            existing.storeId === h.storeId && existing.date === h.date
          );
          if (!dup) history.push(h);
        });
      }

      save();
      renderStores();
      renderHistory();
      updateStats();
      showToast(`Imported ${added} new store${added !== 1 ? 's' : ''} ✓`);
    } catch {
      showToast('Could not read file — is it a valid export?');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ===== TOAST =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
